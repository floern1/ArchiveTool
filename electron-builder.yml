appId: de.geschichtsverein.archivverwaltung-bgv-wk
productName: Archivverwaltung-BGV-WK
copyright: © Geschichtsverein

# Where signed releases are published (used by `electron-builder --publish`).
# Publishes the GitHub release automatically once builds finish.
publish:
  provider: github
  owner: floern1
  repo: ArchiveTool
  releaseType: release

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

asar: true
# Native module (better-sqlite3) must stay unpacked so it can be loaded.
asarUnpack:
  - "**/*.node"

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

linux:
  category: Office
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
