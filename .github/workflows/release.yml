name: Release

# Builds installers for all platforms and attaches them to a GitHub Release.
# Triggered either by pushing a version tag (e.g. v1.0.0) or manually from the
# Actions tab. electron-builder creates the tag/release for the package version
# automatically when run without a tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win --x64 --arm64
          - os: macos-latest
            args: --mac --x64 --arm64
          - os: ubuntu-latest
            args: --linux --x64 --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # electron-builder picks up the tag, creates/updates the GitHub release
      # for this version and uploads the built installers as release assets.
      - run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
