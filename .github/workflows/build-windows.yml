name: Build Windows Installer

# Builds the application on a Windows runner, bundles all Qt/SQLite runtime
# dependencies with windeployqt (so the result needs no pre-installed
# dependencies) and packages a self-contained installer with Inno Setup.
#
# Artifacts produced:
#   * ArchiveTool-Setup-<version>.exe  – the installer
#   * ArchiveTool-portable             – a ready-to-run folder (no install)
#
# Note on architecture: Qt 6 only ships official 64-bit (x64) Windows binaries.
# This workflow therefore builds a 64-bit application, which runs on every
# 64-bit Windows (Windows 10/11 are 64-bit only). A genuine 32-bit (x86) build
# would require Qt 5 or building Qt from source; see README.md.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      QT_VERSION: 6.6.3
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: ""
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $v = (Select-String -Path CMakeLists.txt -Pattern 'VERSION\s+(\d+\.\d+\.\d+)' | Select-Object -First 1).Matches.Groups[1].Value
          if (-not $v) { $v = "1.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage application and bundle dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\ArchiveTool.exe dist\
          # windeployqt copies all required Qt DLLs, platform and sqldriver
          # plugins into the dist folder, making it self-contained.
          windeployqt --release --no-translations --no-opengl-sw dist\ArchiveTool.exe

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" "/DSourceDir=..\dist" "/Oinstaller\Output" installer\archivetool.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ArchiveTool-Setup-${{ steps.version.outputs.version }}
          path: installer/Output/*.exe
          if-no-files-found: error

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: ArchiveTool-portable
          path: dist/**

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
