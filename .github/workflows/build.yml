name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win --x64 --arm64
          - os: macos-latest
            args: --mac --x64 --arm64
          - os: ubuntu-latest
            args: --linux --x64 --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx electron-builder ${{ matrix.args }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: archivtool-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
