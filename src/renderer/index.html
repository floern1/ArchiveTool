<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'" />
  <title>Archivverwaltung-BGV-WK</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ Start screens (database / setup / login) ============ -->

  <div id="screen-start" class="screen start-screen hidden">
    <div class="start-card">
      <div class="brand">
        <div class="brand-logo"><img src="assets/logo.png" alt="Archivverwaltung-BGV-WK" /></div>
        <h1>Archivverwaltung-BGV-WK</h1>
        <p class="brand-sub">Archivverwaltung für den Geschichtsverein</p>
      </div>
      <div id="start-content"></div>
      <p class="start-footer" id="start-footer"></p>
    </div>
  </div>

  <!-- ============ Main application ============ -->

  <div id="screen-main" class="screen main-screen hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo"><img src="assets/logo.png" alt="" /></span>
        <span class="sidebar-title">Archivverwaltung-BGV-WK</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <button class="nav-item" data-view="dashboard"><span class="nav-icon">📊</span>Dashboard</button>
        <button class="nav-item" data-view="records"><span class="nav-icon">🗃️</span>Archiv</button>
        <button class="nav-item" data-view="doctypes"><span class="nav-icon">🧩</span>Dokumenttypen</button>
        <button class="nav-item admin-only" data-view="import"><span class="nav-icon">📥</span>Import</button>
        <button class="nav-item admin-only" data-view="users"><span class="nav-icon">👥</span>Benutzer</button>
      </nav>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">–</div>
          <div class="user-role" id="user-role">–</div>
        </div>
        <button class="icon-btn" id="btn-user-menu" title="Kontomenü">⋮</button>
      </div>
      <div class="sidebar-db" id="sidebar-db" title="">📁 <span id="sidebar-db-path">–</span></div>
    </aside>
    <main class="content" id="content"></main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="js/util.js"></script>
  <script src="js/api.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/records.js"></script>
  <script src="js/views/doctypes.js"></script>
  <script src="js/views/import.js"></script>
  <script src="js/views/users.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
